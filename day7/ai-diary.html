<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정 일기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800 antialiased">

    <!-- 로그인 뷰 -->
    <div id="login-view" class="bg-white w-full max-w-md rounded-2xl shadow-sm p-8" style="display: none;">
        <h1 class="text-3xl font-extrabold text-center text-blue-500 mb-8 tracking-tight">AI 감정 일기</h1>
        <div class="flex flex-col gap-4 mb-4">
            <input type="email" id="email-input" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-5 py-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all text-base" placeholder="이메일을 입력하세요">
            <input type="password" id="password-input" class="w-full bg-gray-50 border border-gray-200 text-gray-800 px-5 py-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all text-base" placeholder="비밀번호를 입력하세요">
            
            <div class="flex flex-col sm:flex-row gap-3 mt-2">
                <button class="flex-1 bg-white border-2 border-gray-200 text-gray-700 font-bold py-4 rounded-xl hover:border-blue-500 hover:text-blue-500 hover:bg-blue-50 transition-all text-base" id="login-btn">로그인</button>
                <button class="flex-1 bg-blue-500 text-white font-bold py-4 rounded-xl shadow-md hover:bg-blue-600 hover:shadow-lg transition-all text-base" id="signup-btn">회원가입</button>
            </div>
            
            <div class="flex items-center text-center text-gray-400 my-2">
                <div class="flex-1 border-b border-gray-200"></div>
                <span class="px-4 text-sm font-light">또는</span>
                <div class="flex-1 border-b border-gray-200"></div>
            </div>
            
            <button class="w-full bg-white border border-gray-200 text-gray-700 font-bold py-4 rounded-xl hover:bg-gray-50 transition-all flex justify-center items-center gap-2 text-base" id="google-btn">
                <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                Google로 로그인
            </button>
        </div>
    </div>

    <!-- 일기장 메인 뷰 -->
    <div id="diary-view" class="w-full max-w-4xl mx-auto flex flex-col gap-6 py-6" style="display: none;">
        <!-- 상단 헤더 -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-5 sm:px-8 rounded-2xl shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-500 m-0">오늘의 하루는 어땠나요?</h1>
            <div class="flex flex-col sm:items-end w-full sm:w-auto">
                <div id="user-email-display" class="text-sm text-gray-500 mb-1 font-medium"></div>
                <button id="logout-btn" class="text-red-500 font-bold text-sm sm:text-base hover:text-red-700 transition-colors self-end sm:self-auto">로그아웃</button>
            </div>
        </div>
        
        <!-- 일기 작성 섹션 -->
        <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-sm flex flex-col gap-5">
            <textarea id="diary-input" class="w-full min-h-[180px] bg-gray-50 border border-gray-200 text-gray-800 p-5 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all text-base sm:text-lg resize-y leading-relaxed font-light" placeholder="오늘 있었던 일이나 느꼈던 감정을 자유롭게 적어주세요."></textarea>
            
            <div class="flex flex-col sm:flex-row gap-3">
                <button class="flex-1 bg-white border-2 border-gray-200 text-gray-700 font-bold py-4 rounded-xl hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50 transition-all text-base sm:text-lg flex justify-center items-center gap-2" id="voice-btn">
                    🎤 음성으로 입력하기
                </button>
                <button class="flex-1 bg-blue-500 text-white font-bold py-4 rounded-xl shadow-md hover:bg-blue-600 hover:shadow-lg transition-all text-base sm:text-lg flex justify-center items-center gap-2" id="analyze-btn">
                    ✨ 분석 요청하기
                </button>
            </div>
        </div>

        <!-- AI 답변 섹션 -->
        <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-sm">
            <div class="text-xl font-extrabold text-gray-800 mb-4 flex items-center gap-2">🤖 AI의 답변</div>
            <div class="bg-gray-50 p-6 rounded-xl text-base sm:text-lg leading-relaxed text-gray-600 min-h-[120px] border border-gray-100 font-light" id="ai-response">
                여기에 AI의 답변이 표시됩니다.
            </div>
        </div>

        <!-- 히스토리 섹션 -->
        <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-sm">
            <h2 class="text-2xl font-extrabold text-blue-500 mb-8 text-center sm:text-left">📔 나의 일기 히스토리</h2>
            <div id="history-list" class="flex flex-col gap-10">
                <div class="text-center text-gray-400 font-light py-8">히스토리를 불러오는 중입니다...</div>
            </div>
        </div>

        <!-- 세련된 현대적 메신저 스타일 채팅 섹션 -->
        <div class="bg-gray-50 rounded-2xl shadow-sm overflow-hidden flex flex-col h-[70vh] min-h-[500px] max-h-[800px] border border-gray-200">
                <!-- 고정 헤더 -->
                <div class="bg-white px-6 py-4 border-b border-gray-200 z-10 shadow-sm flex justify-between items-center">
                    <h2 class="text-xl font-extrabold text-gray-800 flex items-center gap-2 m-0">💬 실시간 채팅</h2>
                    
                    <!-- 프로필 섹션 -->
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col items-end">
                            <span id="chat-header-email" class="text-sm font-bold text-gray-700"></span>
                            <button id="change-photo-btn" class="text-xs text-blue-500 hover:text-blue-700 hover:underline">사진 변경</button>
                        </div>
                        <div class="relative cursor-pointer group flex items-center justify-center w-11 h-11 bg-gray-100 rounded-full border-2 border-gray-200 shadow-sm hover:border-blue-400 transition-colors" onclick="document.getElementById('profile-upload').click()">
                            <!-- 기본 아이콘 -->
                            <svg id="profile-default-icon" class="w-7 h-7 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                            <!-- 사용자 사진 (업로드 시 표시) -->
                            <img id="profile-img" src="" class="absolute inset-0 w-full h-full rounded-full object-cover hidden">
                            
                            <input type="file" id="profile-upload" class="hidden" accept="image/*">
                        </div>
                    </div>
                </div>
                
                <!-- 스크롤 가능한 메시지 영역 -->
                <div class="flex-1 overflow-y-auto p-5" id="chat-box">
                    <div class="flex flex-col items-start mb-5">
                        <div class="max-w-[80%] px-4 py-3 rounded-2xl text-[0.95rem] leading-relaxed shadow-sm bg-white text-gray-800 rounded-bl-sm border border-gray-100">
                            안녕하세요! 무엇이든 편하게 이야기해주세요. 😊
                        </div>
                    </div>
                </div>
                
                <!-- 둥근 캡슐형 입력창 영역 -->
                <div class="bg-white p-4 border-t border-gray-200">
                    <div class="flex gap-2 items-center">
                        <input type="text" id="chat-input" class="flex-1 bg-gray-100 text-gray-800 px-6 py-3.5 rounded-full outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white transition-all text-[0.95rem] shadow-inner" placeholder="메시지를 입력하세요...">
                        
                        <!-- 숨겨진 이미지 파일 선택창 -->
                        <input type="file" id="chat-image-upload" class="hidden" accept="image/*">
                        
                        <!-- 클립 버튼 -->
                        <button id="chat-attach-btn" class="p-3.5 text-gray-400 hover:text-blue-500 hover:bg-blue-50 rounded-full transition-all flex-shrink-0" onclick="document.getElementById('chat-image-upload').click()">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 7.372L8.552 18.32m.009-.01l-.01.01m5.699-9.941l-7.81 7.81a1.5 1.5 0 002.112 2.13" />
                            </svg>
                        </button>

                        <!-- 전송 버튼 (종이비행기 아이콘) -->
                        <button id="chat-send-btn" class="bg-blue-500 hover:bg-blue-600 text-white p-3.5 rounded-full transition-all shadow-md hover:shadow-lg active:scale-95 flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 ml-0.5">
                              <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. Supabase 인증 및 상태 관리
        // ==========================================
        let supabaseClient = null;
        const loginView = document.getElementById('login-view');
        const diaryView = document.getElementById('diary-view');

        async function initAuth() {
            try {
                // 백엔드 API에서 안전하게 환경변수 받아오기
                const res = await fetch('/api/env');
                const env = await res.json();
                
                if(env.error) throw new Error(env.error);

                // Supabase CDN 인스턴스 생성
                supabaseClient = window.supabase.createClient(env.SUPABASE_URL, env.SUPABASE_ANON_KEY);
                
                // 현재 세션(로그인 상태) 확인
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) showDiary(session);
                else showLogin();

                // 로그인/로그아웃 상태가 바뀔 때 감지하여 화면 전환
                supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (session) showDiary(session);
                    else showLogin();
                });
            } catch (err) {
                console.error("인증 초기화 에러:", err);
                alert("서버 통신 중 오류가 발생했습니다.");
            }
        }

        function showLogin() {
            loginView.style.display = 'block';
            diaryView.style.display = 'none';
        }

        let currentUserEmail = '';

        function showDiary(session) {
            loginView.style.display = 'none';
            diaryView.style.display = 'block';
            
            if (session && session.user) {
                currentUserEmail = session.user.email;
                document.getElementById('user-email-display').innerText = session.user.email;
                const headerEmail = document.getElementById('chat-header-email');
                if (headerEmail) headerEmail.innerText = session.user.email;
                
                // 저장된 프로필 이미지가 있다면 불러오기
                if (session.user.user_metadata && session.user.user_metadata.avatar_url) {
                    const profileImg = document.getElementById('profile-img');
                    const defaultIcon = document.getElementById('profile-default-icon');
                    profileImg.src = session.user.user_metadata.avatar_url;
                    profileImg.classList.remove('hidden');
                    defaultIcon.classList.add('hidden');
                }
            }
            
            loadHistory(); // 일기장 화면이 열릴 때 히스토리 불러오기
            loadMessages(); // 기존 채팅 메시지 불러오기
            subscribeToMessages(); // 실시간 채팅 구독 시작
        }

        // 로그인 버튼 클릭
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해주세요.');
            
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert('로그인 실패: ' + error.message);
        });

        // 회원가입 버튼 클릭
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해주세요.');
            
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert('회원가입 실패: ' + error.message);
            else alert('가입 확인 이메일을 확인해주세요!');
        });

        // 구글 로그인 버튼 클릭
        document.getElementById('google-btn').addEventListener('click', async () => {
            const exactRedirectUrl = window.location.origin + '/day7/ai-diary.html';
            const { error } = await supabaseClient.auth.signInWithOAuth({ 
                provider: 'google',
                options: {
                    redirectTo: exactRedirectUrl // 쿼리 파라미터나 해시가 섞이지 않도록 명시적 경로 지정
                }
            });
            if (error) alert('구글 로그인 오류: ' + error.message);
        });

        // 로그아웃 버튼 클릭
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
        });

        const voiceBtn = document.getElementById('voice-btn');
        const diaryInput = document.getElementById('diary-input');
        const historyList = document.getElementById('history-list');
        
        let isRecording = false;

        // 브라우저가 Web Speech API를 지원하는지 확인 (크롬 등은 webkit 접두사 필요)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            
            // 한국어 설정 및 중간 결과 생략 (최종 문장만 입력)
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            // 음성 인식 시작될 때
            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.innerText = '🔴 음성 인식중...';
                voiceBtn.style.color = '#e74c3c';
                voiceBtn.style.borderColor = '#e74c3c';
                voiceBtn.style.backgroundColor = 'rgba(231, 76, 60, 0.05)';
            };

            // 음성 인식이 완료되어 결과를 받았을 때
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                
                // 기존 텍스트가 있다면 띄어쓰기 후 이어붙임
                if (diaryInput.value) {
                    diaryInput.value += ' ' + transcript;
                } else {
                    diaryInput.value = transcript;
                }
            };

            // 음성 인식이 끝났을 때 (자동 종료 혹은 강제 종료)
            recognition.onend = function() {
                isRecording = false;
                voiceBtn.innerText = '🎤 음성으로 입력하기';
                // 스타일 원상 복구
                voiceBtn.style.color = '';
                voiceBtn.style.borderColor = '';
                voiceBtn.style.backgroundColor = '';
            };

            // 에러 발생 시 처리
            recognition.onerror = function(event) {
                console.error("음성 인식 에러:", event.error);
                alert("음성 인식 중 오류가 발생했습니다. 마이크 권한을 확인해주세요.");
            };

            // 버튼 클릭 이벤트 바인딩
            voiceBtn.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop(); // 이미 녹음 중이면 중지
                } else {
                    recognition.start(); // 녹음 시작
                }
            });

        } else {
            // Web Speech API를 지원하지 않는 브라우저의 경우
            voiceBtn.addEventListener('click', () => {
                alert("현재 사용 중인 브라우저에서는 음성 인식 기능을 지원하지 않습니다. 크롬(Chrome) 브라우저를 이용해주세요.");
            });
        }

        // ==========================================
        // 2. AI 일기 분석 요청 기능 (백엔드 연동)
        // ==========================================
        const analyzeBtn = document.getElementById('analyze-btn');
        const aiResponseBox = document.getElementById('ai-response');

        analyzeBtn.addEventListener('click', async () => {
            const text = diaryInput.value.trim();
            if (!text) {
                alert("먼저 오늘의 일기나 느낀 점을 입력해주세요.");
                diaryInput.focus();
                return;
            }

            // 분석 진행 중 UI 변경
            analyzeBtn.innerText = '✨ 분석 중...';
            analyzeBtn.disabled = true;
            analyzeBtn.style.cursor = 'not-allowed';
            analyzeBtn.style.opacity = '0.7';
            aiResponseBox.innerText = 'AI가 일기를 신중하게 읽고 위로를 준비 중입니다... 잠시만 기다려주세요.';

            try {
                // 현재 로그인된 사용자의 토큰 가져오기
                const { data: { session } } = await supabaseClient.auth.getSession();
                const token = session?.access_token;
                if (!token) {
                    throw new Error('로그인 세션이 만료되었습니다. 다시 로그인해주세요.');
                }

                // 안전한 Vercel 백엔드 함수 호출
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '분석 중 서버 오류가 발생했습니다.');
                }

                // AI의 응답 화면에 출력
                aiResponseBox.innerText = data.result;
                
                // 일기 작성 후 히스토리 자동 갱신
                await loadHistory();
            } catch (error) {
                console.error("AI 연동 오류:", error);
                aiResponseBox.innerText = `오류 발생: ${error.message}\n(API 키 설정이나 서버 상태를 확인해주세요.)`;
            } finally {
                // 버튼 상태 복구
                analyzeBtn.innerText = '✨ 분석 요청하기';
                analyzeBtn.disabled = false;
                analyzeBtn.style.cursor = 'pointer';
                analyzeBtn.style.opacity = '1';
            }
        });

        // ==========================================
        // 3. 일기 히스토리 불러오기 기능
        // ==========================================
        async function loadHistory() {
            try {
                // 현재 로그인된 사용자의 토큰 가져오기
                const { data: { session } } = await supabaseClient.auth.getSession();
                const token = session?.access_token;
                if (!token) {
                    // 비로그인 상태일 때는 히스토리를 불러오지 않음
                    return;
                }

                const response = await fetch('/api/history', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '히스토리 로딩 실패');
                }

                if (!data.history || data.history.length === 0) {
                    historyList.innerHTML = '<div class="loading-history">아직 작성된 일기가 없습니다. 첫 일기를 남겨보세요!</div>';
                    return;
                }

                // 히스토리 카드 렌더링
                historyList.innerHTML = data.history.map(item => {
                    const dateObj = new Date(item.timestamp);
                    const dateString = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                    
                    return `
                        <div class="flex flex-col gap-2 relative">
                            <div class="text-[0.75rem] text-gray-400 mb-1 text-right font-light">${dateString}</div>
                            <div class="text-base sm:text-lg text-gray-800 leading-relaxed break-words font-medium">${item.text}</div>
                            <div class="text-sm sm:text-base text-gray-500 leading-relaxed mt-2 pl-3 border-l-2 border-gray-200 font-light">${item.aiResponse.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('History load error:', error);
                historyList.innerHTML = `<div class="loading-history" style="color: #e74c3c;">히스토리를 불러오지 못했습니다. (${error.message})</div>`;
            }
        }

        // ==========================================
        // 4. 실시간 채팅: 메시지 전송 기능
        // ==========================================
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatBox = document.getElementById('chat-box');

        async function sendMessage() {
            const content = chatInput.value.trim();
            if (!content) return; // 빈 메시지는 무시

            try {
                // 현재 로그인된 사용자의 정보 가져오기
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    alert('로그인이 만료되었습니다. 다시 로그인해주세요.');
                    return;
                }

                const userEmail = session.user.email;

                // 버튼 비활성화 (연타 방지 및 아이콘 투명도 조절)
                chatSendBtn.disabled = true;
                chatSendBtn.classList.add('opacity-50', 'cursor-not-allowed');

                // Supabase 'messages' 테이블에 데이터 저장
                const { error } = await supabaseClient
                    .from('messages')
                    .insert([
                        { content: content, user_email: userEmail }
                    ]);

                if (error) {
                    throw error;
                }

                // 전송 성공 시 입력창 깨끗하게 비우기
                chatInput.value = '';

                // 로컬 UI에 즉시 표시하는 기능은 아직 추가하지 않았음 (다음 단계에서 실시간 구독으로 처리)
            } catch (error) {
                console.error("메시지 전송 오류:", error);
                alert("메시지 전송에 실패했습니다: " + error.message);
            } finally {
                // 버튼 상태 복구
                chatSendBtn.disabled = false;
                chatSendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                chatInput.focus();
            }
        }

        // 전송 버튼 클릭 시
        chatSendBtn.addEventListener('click', sendMessage);

        // 엔터 키를 눌렀을 때 전송되도록 이벤트 연결
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 5. 채팅 렌더링 및 실시간 기능
        let chatSubscription = null;

        function renderMessage(msg) {
            // 첫 안내 메시지 지우기
            if (chatBox.innerHTML.includes('첫 채팅을 남겨보세요!')) {
                chatBox.innerHTML = '';
            }

            const isMe = msg.user_email === currentUserEmail;
            
            const msgWrapper = document.createElement('div');
            // 가로 배치 레이아웃 (내 메시지는 오른쪽, 남의 메시지는 왼쪽)
            msgWrapper.className = `flex gap-3 mb-5 ${isMe ? 'flex-row-reverse' : 'flex-row'}`;
            
            // 아바타 영역
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'flex-shrink-0 mt-1';
            
            // 고유 식별자 기반 아바타 URL 생성
            const avatarUrl = supabaseClient.storage.from('avatars').getPublicUrl(`${msg.user_id}/avatar.png`).data.publicUrl;
            // 404 에러 시 보여줄 기본 사람 모양 아이콘 (UI Avatars)
            const fallbackSrc = `https://ui-avatars.com/api/?name=${msg.user_email.charAt(0)}&background=F3F4F6&color=9CA3AF`;
            
            // 이미지 태그 생성 (onerror 속성으로 기본 이미지 폴백 처리)
            avatarDiv.innerHTML = `<img src="${avatarUrl}" onerror="this.src='${fallbackSrc}'" class="w-10 h-10 rounded-full object-cover border border-gray-200 shadow-sm bg-white">`;
            
            // 메시지 본문 컨테이너
            const contentWrapper = document.createElement('div');
            contentWrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[75%]`;
            
            const emailDiv = document.createElement('div');
            emailDiv.className = 'text-[0.7rem] text-gray-500 mb-1.5 px-1 opacity-80';
            emailDiv.innerText = msg.user_email;
            
            const bubbleDiv = document.createElement('div');
            
            // 이미지 메시지인지 확인 ([IMAGE]URL[/IMAGE] 형식)
            let isImage = false;
            let contentHtml = '';
            
            if (msg.content.startsWith('[IMAGE]') && msg.content.endsWith('[/IMAGE]')) {
                isImage = true;
                const imgUrl = msg.content.substring(7, msg.content.length - 8);
                // 이미지 태그 렌더링 (onerror 추가)
                contentHtml = `<img src="${imgUrl}" class="max-w-[200px] sm:max-w-[250px] rounded-xl shadow-md border border-gray-200" onerror="this.onerror=null; this.parentElement.innerText='⚠️ 이미지를 불러올 수 없습니다.'; this.parentElement.className='text-red-500 text-sm bg-red-50 p-3 rounded-xl'">`;
            } else {
                // 일반 텍스트 렌더링 (XSS 방지)
                const tempDiv = document.createElement('div');
                tempDiv.innerText = msg.content;
                contentHtml = tempDiv.innerHTML;
            }

            // 이미지일 때는 말풍선 배경과 패딩을 없앰
            if (isImage) {
                bubbleDiv.className = 'mt-1 cursor-pointer hover:opacity-90 transition-opacity';
            } else {
                bubbleDiv.className = `px-4 py-3 rounded-2xl text-[0.95rem] leading-relaxed shadow-sm ${
                    isMe 
                    ? 'bg-blue-500 text-white rounded-tr-none' 
                    : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'
                }`;
            }
            
            bubbleDiv.innerHTML = contentHtml;
            
            contentWrapper.appendChild(emailDiv);
            contentWrapper.appendChild(bubbleDiv);
            
            msgWrapper.appendChild(avatarDiv);
            msgWrapper.appendChild(contentWrapper);
            
            chatBox.appendChild(msgWrapper);
            chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 맨 아래로 이동
        }

        async function loadMessages() {
            chatBox.innerHTML = '<div class="text-center text-gray-500 py-8">채팅을 불러오는 중...</div>';
            const { data: messages, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50); // 최근 50개만 표시
                
            if (error) {
                console.error("채팅 로딩 에러:", error);
                chatBox.innerHTML = '<div class="text-center text-red-500 py-8">채팅을 불러오지 못했습니다.</div>';
                return;
            }
            
            chatBox.innerHTML = '';
            if (!messages || messages.length === 0) {
                chatBox.innerHTML = `
                    <div class="flex flex-col items-start mb-5">
                        <div class="max-w-[80%] px-4 py-3 rounded-2xl text-[0.95rem] leading-relaxed shadow-sm bg-white text-gray-800 rounded-bl-sm border border-gray-100">
                            아직 작성된 메시지가 없습니다. 첫 채팅을 남겨보세요! 😊
                        </div>
                    </div>`;
            } else {
                messages.forEach(msg => renderMessage(msg));
            }
        }

        function subscribeToMessages() {
            if (chatSubscription) return; // 이미 구독 중이면 중복 방지
            
            chatSubscription = supabaseClient.channel('custom-all-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                    renderMessage(payload.new);
                })
                .subscribe();
        }

        // ==========================================
        // 5.5 채팅 이미지 업로드 (클립 버튼)
        // ==========================================
        const chatImageUpload = document.getElementById('chat-image-upload');
        const chatAttachBtn = document.getElementById('chat-attach-btn');

        chatImageUpload.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            try {
                // UI 상태 변경 (버튼 비활성화 및 깜빡임 효과)
                chatAttachBtn.classList.add('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                chatAttachBtn.disabled = true;

                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) throw new Error("로그인이 필요합니다.");

                const userEmail = session.user.email;
                const fileExt = file.name.split('.').pop();
                // 고유한 파일명 생성 (타임스탬프 + 난수)
                const fileName = `${new Date().getTime()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                // 1. Supabase Storage 'chat-images' 버킷에 업로드
                const { error: uploadError } = await supabaseClient.storage
                    .from('chat-images')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. 업로드된 파일의 Public URL 가져오기
                const { data } = supabaseClient.storage.from('chat-images').getPublicUrl(fileName);
                const publicUrl = data.publicUrl;

                // 3. 메시지 텍스트를 '[IMAGE]URL[/IMAGE]' 특수 포맷으로 만들어서 전송
                const messageContent = `[IMAGE]${publicUrl}[/IMAGE]`;
                
                const { error: insertError } = await supabaseClient
                    .from('messages')
                    .insert([{ content: messageContent, user_email: userEmail }]);

                if (insertError) throw insertError;
                
                // 삽입이 완료되면 실시간 구독(Realtime)에 의해 화면에 자동으로 그려집니다.
                
            } catch (err) {
                console.error("채팅 이미지 전송 에러:", err);
                alert("이미지 전송에 실패했습니다: " + err.message);
            } finally {
                // UI 복구
                chatAttachBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                chatAttachBtn.disabled = false;
                chatImageUpload.value = ''; // 입력창 초기화
            }
        });

        // ==========================================
        // 6. 프로필 사진 기능 (Supabase 연동)
        // ==========================================
        const profileUpload = document.getElementById('profile-upload');
        const changePhotoBtn = document.getElementById('change-photo-btn');
        const profileImg = document.getElementById('profile-img');
        const defaultIcon = document.getElementById('profile-default-icon');

        profileUpload.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            try {
                // UI 상태 변경
                changePhotoBtn.innerText = '업로드 중...';
                changePhotoBtn.disabled = true;

                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) throw new Error("로그인이 필요합니다.");
                
                const userId = session.user.id;
                // 요구사항대로 파일 경로를 '[user_id]/avatar.png'로 고정
                const filePath = `${userId}/avatar.png`;

                // ① Supabase Storage에 업로드 (upsert: true 로 기존 파일 덮어쓰기)
                const { error: uploadError } = await supabaseClient.storage
                    .from('avatars')
                    .upload(filePath, file, { upsert: true });
                    
                if (uploadError) throw uploadError;

                // ② 공개 URL 가져오기 (이미지 캐싱 갱신을 위해 타임스탬프 쿼리 추가)
                const { data } = supabaseClient.storage.from('avatars').getPublicUrl(filePath);
                const publicUrl = data.publicUrl + '?t=' + new Date().getTime();

                // ③ Auth 메타데이터 업데이트
                const { error: updateError } = await supabaseClient.auth.updateUser({
                    data: { avatar_url: publicUrl }
                });
                if (updateError) throw updateError;

                // ④ 화면 상단 프로필 이미지 즉시 변경
                profileImg.src = publicUrl;
                profileImg.classList.remove('hidden');
                defaultIcon.classList.add('hidden');
                
                // ⑤ 채팅 메시지 이미지 갱신을 위한 임시 꼼수 (화면 다시 그리기)
                loadMessages();
                
                alert('프로필 사진이 성공적으로 변경되었습니다!');
                
            } catch (err) {
                console.error("프로필 업로드 에러:", err);
                alert("업로드 실패: " + err.message);
            } finally {
                // 버튼 원상복구
                changePhotoBtn.innerText = '사진 변경';
                changePhotoBtn.disabled = false;
                // input file 초기화 (동일 파일 재선택 가능하게)
                profileUpload.value = '';
            }
        });

        // 텍스트 버튼을 눌러도 파일 선택창이 뜨도록 연결
        changePhotoBtn.addEventListener('click', () => {
            profileUpload.click();
        });

        // 페이지 로드 시 가장 먼저 인증 초기화 시작
        window.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
</html>
