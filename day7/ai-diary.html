<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정 일기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #4a90e2; /* 감정 일기에 어울리는 차분하고 신뢰감 있는 블루 */
            --primary-hover: #357abd;
            --secondary-color: #f5a623; /* 음성 입력 등 보조 버튼용 따뜻한 색상 */
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #333333;
            --text-sub: #666666;
            --box-bg: #f5f6fa;
            --border-color: #dcdde1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            min-height: 100%;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 1.2rem;
            font-family: 'Pretendard', sans-serif;
            font-size: 1.1rem;
            color: var(--text-main);
            background-color: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            resize: vertical;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        textarea::placeholder {
            color: #b2bec3;
        }

        .button-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-voice {
            background-color: white;
            color: var(--text-main);
            border: 2px solid var(--border-color);
        }

        .btn-voice:hover {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
            background-color: rgba(245, 166, 35, 0.05);
            transform: translateY(-2px);
        }

        .btn-analyze {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .btn-analyze:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .response-section {
            margin-top: 1rem;
            border-top: 2px dashed var(--border-color);
            padding-top: 2.5rem;
        }

        .response-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .response-box {
            background-color: var(--box-bg);
            padding: 1.8rem;
            border-radius: 16px;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text-sub);
            min-height: 120px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* 반응형 */
        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
            .button-group {
                flex-direction: column;
            }
            h1 {
                font-size: 1.7rem;
            }
        /* 히스토리 섹션 스타일 */
        .history-section {
            margin-top: 3rem;
            padding-top: 2.5rem;
            border-top: 2px dashed var(--border-color);
        }
        
        .history-section h2 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 800;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .history-card {
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: transform 0.3s ease;
        }

        .history-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.04);
        }

        .history-date {
            font-size: 0.9rem;
            color: #b2bec3;
            margin-bottom: 0.8rem;
            text-align: right;
            font-weight: 500;
        }

        .history-my-text {
            font-size: 1.05rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.6;
            padding-left: 1rem;
            border-left: 4px solid var(--primary-color);
            word-break: break-word;
        }

        .history-ai-response {
            background-color: var(--box-bg);
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.6;
        }
        
        .loading-history {
            text-align: center;
            color: var(--text-sub);
            padding: 2rem 0;
        }
        .auth-input {
            width: 100%;
            padding: 1.2rem;
            font-family: 'Pretendard', sans-serif;
            font-size: 1.1rem;
            color: var(--text-main);
            background-color: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #b2bec3;
            margin: 0.5rem 0;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        
        .divider span {
            padding: 0 10px;
            font-size: 0.9rem;
        }

        .btn-google {
            background-color: white;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-google:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <!-- 로그인 뷰 -->
    <div id="login-view" class="container" style="display: none;">
        <h1>AI 감정 일기</h1>
        <div class="input-group" style="margin-bottom: 1rem;">
            <input type="email" id="email-input" class="auth-input" placeholder="이메일을 입력하세요">
            <input type="password" id="password-input" class="auth-input" placeholder="비밀번호를 입력하세요">
            
            <div class="button-group">
                <button class="btn btn-voice" id="login-btn">로그인</button>
                <button class="btn btn-analyze" id="signup-btn">회원가입</button>
            </div>
            
            <div class="divider"><span>또는</span></div>
            
            <button class="btn btn-google" id="google-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="margin-right: 8px;"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                Google로 로그인
            </button>
        </div>
    </div>

    <div id="diary-view" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 style="margin-bottom: 0;">오늘의 하루는 어땠나요?</h1>
            <div style="text-align: right;">
                <div id="user-email-display" style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 4px;"></div>
                <button id="logout-btn" style="background: none; border: none; color: #e74c3c; cursor: pointer; font-weight: bold; font-size: 0.9rem;">로그아웃</button>
            </div>
        </div>
        
        <div class="input-group">
            <textarea id="diary-input" placeholder="오늘 있었던 일이나 느꼈던 감정을 자유롭게 적어주세요."></textarea>
            
            <div class="button-group">
                <button class="btn btn-voice" id="voice-btn">
                    🎤 음성으로 입력하기
                </button>
                <button class="btn btn-analyze" id="analyze-btn">
                    ✨ 분석 요청하기
                </button>
            </div>
        </div>

        <div class="response-section">
            <div class="response-title">🤖 AI의 답변</div>
            <div class="response-box" id="ai-response">
                여기에 AI의 답변이 표시됩니다.
            </div>
        </div>

        <div class="history-section">
            <h2>📔 나의 일기 히스토리</h2>
            <div id="history-list" class="history-list">
                <div class="loading-history">히스토리를 불러오는 중입니다...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 0. Supabase 인증 및 상태 관리
        // ==========================================
        let supabaseClient = null;
        const loginView = document.getElementById('login-view');
        const diaryView = document.getElementById('diary-view');

        async function initAuth() {
            try {
                // 백엔드 API에서 안전하게 환경변수 받아오기
                const res = await fetch('/api/env');
                const env = await res.json();
                
                if(env.error) throw new Error(env.error);

                // Supabase CDN 인스턴스 생성
                supabaseClient = window.supabase.createClient(env.SUPABASE_URL, env.SUPABASE_ANON_KEY);
                
                // 현재 세션(로그인 상태) 확인
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) showDiary(session);
                else showLogin();

                // 로그인/로그아웃 상태가 바뀔 때 감지하여 화면 전환
                supabaseClient.auth.onAuthStateChange((event, session) => {
                    if (session) showDiary(session);
                    else showLogin();
                });
            } catch (err) {
                console.error("인증 초기화 에러:", err);
                alert("서버 통신 중 오류가 발생했습니다.");
            }
        }

        function showLogin() {
            loginView.style.display = 'block';
            diaryView.style.display = 'none';
        }

        function showDiary(session) {
            loginView.style.display = 'none';
            diaryView.style.display = 'block';
            
            if (session && session.user) {
                document.getElementById('user-email-display').innerText = session.user.email;
            }
            
            loadHistory(); // 일기장 화면이 열릴 때 히스토리 불러오기
        }

        // 로그인 버튼 클릭
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해주세요.');
            
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert('로그인 실패: ' + error.message);
        });

        // 회원가입 버튼 클릭
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return alert('이메일과 비밀번호를 모두 입력해주세요.');
            
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert('회원가입 실패: ' + error.message);
            else alert('가입 확인 이메일을 확인해주세요!');
        });

        // 구글 로그인 버튼 클릭
        document.getElementById('google-btn').addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({ 
                provider: 'google',
                options: {
                    redirectTo: window.location.href // 현재 로그인 창(ai-diary.html)으로 다시 돌아오도록 고정
                }
            });
            if (error) alert('구글 로그인 오류: ' + error.message);
        });

        // 로그아웃 버튼 클릭
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
        });

        const voiceBtn = document.getElementById('voice-btn');
        const diaryInput = document.getElementById('diary-input');
        const historyList = document.getElementById('history-list');
        
        let isRecording = false;

        // 브라우저가 Web Speech API를 지원하는지 확인 (크롬 등은 webkit 접두사 필요)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            
            // 한국어 설정 및 중간 결과 생략 (최종 문장만 입력)
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            // 음성 인식 시작될 때
            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.innerText = '🔴 음성 인식중...';
                voiceBtn.style.color = '#e74c3c';
                voiceBtn.style.borderColor = '#e74c3c';
                voiceBtn.style.backgroundColor = 'rgba(231, 76, 60, 0.05)';
            };

            // 음성 인식이 완료되어 결과를 받았을 때
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                
                // 기존 텍스트가 있다면 띄어쓰기 후 이어붙임
                if (diaryInput.value) {
                    diaryInput.value += ' ' + transcript;
                } else {
                    diaryInput.value = transcript;
                }
            };

            // 음성 인식이 끝났을 때 (자동 종료 혹은 강제 종료)
            recognition.onend = function() {
                isRecording = false;
                voiceBtn.innerText = '🎤 음성으로 입력하기';
                // 스타일 원상 복구
                voiceBtn.style.color = '';
                voiceBtn.style.borderColor = '';
                voiceBtn.style.backgroundColor = '';
            };

            // 에러 발생 시 처리
            recognition.onerror = function(event) {
                console.error("음성 인식 에러:", event.error);
                alert("음성 인식 중 오류가 발생했습니다. 마이크 권한을 확인해주세요.");
            };

            // 버튼 클릭 이벤트 바인딩
            voiceBtn.addEventListener('click', () => {
                if (isRecording) {
                    recognition.stop(); // 이미 녹음 중이면 중지
                } else {
                    recognition.start(); // 녹음 시작
                }
            });

        } else {
            // Web Speech API를 지원하지 않는 브라우저의 경우
            voiceBtn.addEventListener('click', () => {
                alert("현재 사용 중인 브라우저에서는 음성 인식 기능을 지원하지 않습니다. 크롬(Chrome) 브라우저를 이용해주세요.");
            });
        }

        // ==========================================
        // 2. AI 일기 분석 요청 기능 (백엔드 연동)
        // ==========================================
        const analyzeBtn = document.getElementById('analyze-btn');
        const aiResponseBox = document.getElementById('ai-response');

        analyzeBtn.addEventListener('click', async () => {
            const text = diaryInput.value.trim();
            if (!text) {
                alert("먼저 오늘의 일기나 느낀 점을 입력해주세요.");
                diaryInput.focus();
                return;
            }

            // 분석 진행 중 UI 변경
            analyzeBtn.innerText = '✨ 분석 중...';
            analyzeBtn.disabled = true;
            analyzeBtn.style.cursor = 'not-allowed';
            analyzeBtn.style.opacity = '0.7';
            aiResponseBox.innerText = 'AI가 일기를 신중하게 읽고 위로를 준비 중입니다... 잠시만 기다려주세요.';

            try {
                // 안전한 Vercel 백엔드 함수 호출
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '분석 중 서버 오류가 발생했습니다.');
                }

                // AI의 응답 화면에 출력
                aiResponseBox.innerText = data.result;
                
                // 일기 작성 후 히스토리 자동 갱신
                await loadHistory();
            } catch (error) {
                console.error("AI 연동 오류:", error);
                aiResponseBox.innerText = `오류 발생: ${error.message}\n(API 키 설정이나 서버 상태를 확인해주세요.)`;
            } finally {
                // 버튼 상태 복구
                analyzeBtn.innerText = '✨ 분석 요청하기';
                analyzeBtn.disabled = false;
                analyzeBtn.style.cursor = 'pointer';
                analyzeBtn.style.opacity = '1';
            }
        });

        // ==========================================
        // 3. 일기 히스토리 불러오기 기능
        // ==========================================
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '히스토리 로딩 실패');
                }

                if (!data.history || data.history.length === 0) {
                    historyList.innerHTML = '<div class="loading-history">아직 작성된 일기가 없습니다. 첫 일기를 남겨보세요!</div>';
                    return;
                }

                // 히스토리 카드 렌더링
                historyList.innerHTML = data.history.map(item => {
                    const dateObj = new Date(item.timestamp);
                    const dateString = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                    
                    return `
                        <div class="history-card">
                            <div class="history-date">${dateString}</div>
                            <div class="history-my-text">${item.text}</div>
                            <div class="history-ai-response">${item.aiResponse.replace(/\n/g, '<br>')}</div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('History load error:', error);
                historyList.innerHTML = `<div class="loading-history" style="color: #e74c3c;">히스토리를 불러오지 못했습니다. (${error.message})</div>`;
            }
        }

        // 페이지 로드 시 가장 먼저 인증 초기화 시작
        window.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
