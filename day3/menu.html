<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 점심 메뉴 투표</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #81c784;
            --secondary-color: #2e7d32;
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            color: #2d3436;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            background: linear-gradient(135deg, #81c784 0%, #66bb6a 100%);
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 3rem;
        }

        .header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--secondary-color) 0%, #1b5e20 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .menu-item {
            background: white;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border-color: var(--primary-color);
        }

        .menu-item.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--secondary-color);
            transform: scale(1.05);
        }

        .vote-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(129, 199, 132, 0.3);
            width: 100%;
        }

        .vote-btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(46, 125, 50, 0.4);
        }

        .result-section {
            margin-top: 3rem;
            text-align: left;
            display: none;
            /* 투표 전에는 숨김 */
            animation: fadeIn 0.5s ease;
        }

        .result-item {
            margin-bottom: 1.5rem;
        }

        .result-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .progress-bar {
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 1s ease-in-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h2>점심 투표 서비스</h2>
    </header>

    <div class="container">
        <h1>🍱 오늘의 점심 메뉴는?</h1>

        <div class="menu-grid" id="menu-grid">
            <div class="menu-item" data-menu="김밥">김밥 🍙</div>
            <div class="menu-item" data-menu="제육볶음">제육볶음 🥘</div>
            <div class="menu-item" data-menu="삼겹살">삼겹살 🥓</div>
            <div class="menu-item" data-menu="떡갈비">떡갈비 🍖</div>
        </div>

        <button class="vote-btn" id="vote-btn">투표하기</button>

        <div class="result-section" id="result-section">
            <h3 style="text-align: center; margin-bottom: 2rem; color: var(--secondary-color);">📊 투표 결과</h3>
            <div id="results-container"></div>
        </div>
    </div>

    <script>
        const menuItems = document.querySelectorAll('.menu-item');
        const voteBtn = document.getElementById('vote-btn');
        const resultSection = document.getElementById('result-section');
        const resultsContainer = document.getElementById('results-container');

        let selectedMenu = null;
        let votes = {
            '김밥': 0,
            '제육볶음': 0,
            '삼겹살': 0,
            '떡갈비': 0
        };

        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/10h1b1Mzi91ewSVG6XTPI0ZxMZ0-cliULakvGxNCxsO4/gviz/tq?tqx=out:csv';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxSO0_OLJaqT553DtjZz47b0DxYeCz0RGWQ4fVXEApapLrfCFGciDZtKbSqXyh3T-xQHg/exec';

        // 페이지 로드 시 구글 시트 데이터 불러오기
        window.addEventListener('DOMContentLoaded', () => loadVotesFromSheet(false));

        async function loadVotesFromSheet(shouldScroll = false) {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                parseVotes(csvData);
                showResults(shouldScroll);
            } catch (error) {
                console.error('데이터를 불러오는 중 오류 발생:', error);
                showResults(false);
            }
        }

        function parseVotes(csv) {
            // 투표수 초기화
            Object.keys(votes).forEach(key => votes[key] = 0);

            const lines = csv.split('\n');
            // 첫 번째 줄(헤더) 제외하고 데이터 파싱
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].replace(/"/g, ''); // 따옴표 제거
                if (!line) continue;

                const columns = line.split(',');
                const menuName = columns[1] ? columns[1].trim() : null; // B열 (menu)

                if (menuName && votes.hasOwnProperty(menuName)) {
                    votes[menuName]++;
                }
            }
        }

        // 메뉴 선택 이벤트
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                menuItems.forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
                selectedMenu = item.getAttribute('data-menu');
            });
        });

        // 투표 버튼 이벤트
        voteBtn.addEventListener('click', async () => {
            if (!selectedMenu) {
                alert('메뉴를 먼저 선택해주세요!');
                return;
            }

            // UI 피드백 (투표 중)
            voteBtn.disabled = true;
            voteBtn.innerText = '투표 전송 중...';
            voteBtn.style.backgroundColor = '#ccc';
            voteBtn.style.boxShadow = 'none';
            voteBtn.style.cursor = 'wait';

            // Google Apps Script로 POST 전송
            const formData = new FormData();
            formData.append('menu', selectedMenu);

            try {
                // no-cors 설정으로 CORS 제약 우회
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                // 성공 UI 업데이트
                voteBtn.innerText = '투표 완료!';
                voteBtn.style.cursor = 'default';

                // 구글 시트에 데이터가 반영될 시간을 약간 준 후 데이터 리로드
                setTimeout(() => {
                    loadVotesFromSheet(true);
                }, 1500);

            } catch (error) {
                console.error('투표 중 오류:', error);
                alert('네트워크 오류가 발생했습니다. 다시 시도해주세요.');

                // 상태 롤백
                voteBtn.disabled = false;
                voteBtn.innerText = '투표하기';
                voteBtn.style.backgroundColor = 'var(--primary-color)';
                voteBtn.style.cursor = 'pointer';
            }
        });

        function showResults(shouldScroll) {
            const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);
            resultsContainer.innerHTML = '';

            Object.keys(votes).forEach(menu => {
                const count = votes[menu];
                const percentage = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;

                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <div class="result-label">
                        <span>${menu}</span>
                        <span>${count}표 (${percentage}%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                `;
                resultsContainer.appendChild(resultItem);

                setTimeout(() => {
                    resultItem.querySelector('.progress-fill').style.width = percentage + '%';
                }, 100);
            });

            resultSection.style.display = 'block';

            if (shouldScroll) {
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }
        }
    </script>
</body>

</html>
