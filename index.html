<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫 번째 아이디어</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #0b132b; /* 진한 네이비/블루 배경 */
            background-image: radial-gradient(circle at center, #1c2541 0%, #0b132b 100%);
            color: #ffffff;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 4rem 7rem;
            background: rgba(255, 255, 255, 0.05); /* 글래스모피즘 컨테이너 */
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.5), rgba(0, 242, 254, 0.1));
            z-index: -1;
            border-radius: 32px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .container:hover::before {
            opacity: 1;
        }
        h1 {
            font-size: 6rem; /* 글자 크기 훨씬 더 크게 */
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); /* 밝고 시원한 파란색 그라데이션 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 4px 20px rgba(0, 242, 254, 0.4)); /* 네온 글로우 효과 */
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: default;
        }
        h1:hover {
            transform: scale(1.02);
            filter: drop-shadow(0px 8px 30px rgba(0, 242, 254, 0.6));
        }
        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(50px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>내 첫 번째 아이디어</h1>
    </div>
</body>
</html>
