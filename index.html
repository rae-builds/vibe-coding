<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rae's Vibe Coding Portfolio</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2d3436;
        }

        body, html {
            min-height: 100%;
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            margin-top: 2rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 0;
            color: #2d3436;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #636e72;
            margin-top: 1rem;
        }

        .portfolio-grid {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1000px;
            padding: 0 2rem 4rem 2rem;
        }

        .app-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 300px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.9);
        }

        .app-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .app-desc {
            font-size: 1rem;
            color: #636e72;
            line-height: 1.5;
        }

        .footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: #636e72;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .app-card { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 나의 바이브코딩 프로젝트</h1>
        <p class="subtitle">그동안 만든 웹 어플리케이션을 한 곳에 모았습니다.</p>
    </div>

    <div class="portfolio-grid">
        <!-- 1. 점심 메뉴 추천기 -->
        <a href="./day3/menu.html" class="app-card">
            <div class="app-icon">🍱</div>
            <div class="app-title">점심 메뉴 투표앱</div>
            <div class="app-desc">구글 시트와 연동되어 실시간으로 메뉴를 투표하고 결과를 확인하는 웹 앱</div>
        </a>

        <!-- 2. 나만의 MBTI 테스트 -->
        <a href="./day4/mbti.html" class="app-card">
            <div class="app-icon">🧠</div>
            <div class="app-title">동적 MBTI 테스트</div>
            <div class="app-desc">질문 순서와 선택지가 랜덤으로 섞이며, 16종의 귀여운 캐릭터 결과가 나오는 앱</div>
        </a>

        <!-- 3. AI 감정 일기 -->
        <a href="./day7/ai-diary.html" class="app-card">
            <div class="app-icon">📔</div>
            <div class="app-title">AI 감정 일기</div>
            <div class="app-desc">로그인 기능과 일기 히스토리가 추가된 나만의 감정 다이어리</div>
        </a>
    </div>

    <div class="footer">
        <p>✨ Created by Vibe Coding</p>
    </div>

</body>
</html>
