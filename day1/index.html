<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘도 힘내세요!</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', 'Pretendard', sans-serif; /* 현대적인 폰트로 교체 */
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); /* 밝은 회색 그라데이션 */
            color: #2d3436;
            overflow: hidden;
        }
        /* 배경에 부드러운 움직임을 주는 요소 추가 */
        body::before {
            content: '';
            position: absolute;
            width: 140vw;
            height: 140vh;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(233,236,239,0) 70%);
            animation: moveBackground 15s linear infinite;
            z-index: -1;
        }
        .container {
            text-align: center;
            padding: 5rem 8rem;
            background: rgba(255, 255, 255, 0.4); /* 밝은 테마에 맞는 화이트 글래스 */
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.03),
                0 30px 60px rgba(0, 0, 0, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        .container:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.05),
                0 40px 80px rgba(0, 0, 0, 0.08);
        }
        h1 {
            font-size: 48px;
            font-weight: 800;
            margin: 0 0 2.5rem 0;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 4px 12px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease, opacity 0.3s ease; /* 투명도 전환 추가 */
            cursor: default;
        }
        h1.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
        .btn {
            display: inline-block;
            padding: 1.2rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); /* 기본 블루 */
            background-color: #4facfe;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.2);
            transition: all 0.4s ease;
            text-decoration: none;
            outline: none;
        }
        /* 색상별 버튼 클래스 - 명시도 강화 */
        .btn.yellow-theme {
            background-image: linear-gradient(135deg, #f6d365 0%, #fda085 100%) !important;
            box-shadow: 0 10px 20px rgba(253, 160, 133, 0.3) !important;
        }
        .btn.orange-theme {
            background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%) !important;
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3) !important;
        }
        .btn.green-theme {
            background-image: linear-gradient(135deg, #00b09b 0%, #96c93d 100%) !important;
            box-shadow: 0 10px 20px rgba(150, 201, 61, 0.3) !important;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            filter: brightness(1.05);
        }
        .btn:active {
            transform: translateY(-1px) scale(0.98);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes moveBackground {
            0% { transform: translate(-10%, -10%); }
            50% { transform: translate(0%, 0%); }
            100% { transform: translate(-10%, -10%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="main-text">오늘도 힘내세요!</h1>
        <button class="btn" id="next-btn">다음 문장 보기</button>
    </div>

    <script>
        const sentences = [
            "오늘도 힘내세요!",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];
        let currentIndex = 0;

        const textElement = document.getElementById('main-text');
        const btnElement = document.getElementById('next-btn');

        btnElement.addEventListener('click', () => {
            // 페이드 아웃 효과
            textElement.classList.add('fade-out');
            
            setTimeout(() => {
                // 문장 변경
                currentIndex = (currentIndex + 1) % sentences.length;
                textElement.innerText = sentences[currentIndex];
                
                // 버튼 색상 변경
                btnElement.classList.remove('yellow-theme', 'orange-theme', 'green-theme');
                if (currentIndex === 1) btnElement.classList.add('yellow-theme');
                else if (currentIndex === 2) btnElement.classList.add('orange-theme');
                else if (currentIndex === 3) btnElement.classList.add('green-theme');
                
                // 페이드 인 효과
                textElement.classList.remove('fade-out');
            }, 300);
        });
    </script>
</body>
</html>
